services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: alfabemail-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public
    networks:
      - alfabemail
      - mailcow_shared

  mysql:
    image: mysql:8.0
    container_name: alfabemail-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-alfabemail}
      MYSQL_USER: ${DB_USERNAME:-alfabe}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./storage/backups/mysql:/backups
    networks:
      - alfabemail

  redis:
    image: redis:7-alpine
    container_name: alfabemail-redis
    ports:
      - "6380:6379"
    networks:
      - alfabemail

networks:
  alfabemail:
    driver: bridge
  mailcow_shared:
    external: true
    name: ${MAILCOW_DOCKER_NETWORK:-mailcowdockerized_mailcow-network}

volumes:
  mysql_data:

<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfabe Portal | Veli Paneli</title>
    <style>
      :root {
        --navy: #1f3152;
        --navy-soft: #304870;
        --cream: #fff8de;
        --cream-2: #fff3c3;
        --card: #ffffff;
        --muted: #6b7690;
        --line: #e7e9ef;
        --shadow: 0 14px 28px rgba(31, 49, 82, 0.14);
        --radius: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Nunito', 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, #fffef9 8%, var(--cream) 55%, #f4f6ff 100%);
        color: var(--navy);
      }

      .container {
        width: min(1180px, 95vw);
        margin: 24px auto;
      }

      .header {
        background: linear-gradient(140deg, var(--navy), var(--navy-soft));
        color: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .header h1 { margin: 0 0 6px; font-size: clamp(22px, 4vw, 30px); }
      .header p { margin: 0; opacity: 0.92; }

      .badge {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 9px 14px;
        font-weight: 700;
      }

      .contact-btn {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        background: #f6d36e;
        color: #253b62;
        cursor: pointer;
      }

      .cards {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .stat-title {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .stat-value {
        font-size: 30px;
        font-weight: 800;
        margin: 0;
        color: var(--navy);
      }

      .content-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 14px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 19px;
      }

      .chart-wrap {
        position: relative;
        height: 320px;
      }

      .filter-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      select {
        border: 1px solid #d5dbe8;
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        color: var(--navy);
        background: #fff;
      }

      .timeline {
        list-style: none;
        margin: 0;
        padding: 0;
        border-left: 3px solid #f0df9d;
      }

      .timeline li {
        position: relative;
        margin-left: 14px;
        padding: 0 0 12px 10px;
        color: #2f4568;
      }

      .timeline li::before {
        content: '';
        position: absolute;
        left: -18px;
        top: 4px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f3c854;
      }

      .timeline small { color: var(--muted); display: block; margin-top: 3px; }

      @media (max-width: 920px) {
        .cards { grid-template-columns: 1fr; }
        .content-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body data-role="veli">
    <div class="container">
      <header class="header">
        <div>
          <h1>🧭 Veli Paneli</h1>
          <p id="parentInfo"></p>
          <p id="studentInfo"></p>
        </div>
        <div style="display:grid; gap:8px; justify-items:end;">
          <button class="contact-btn" id="contactTeacherBtn">Öğretmenle İletişim</button>
        </div>
      </header>

      <section class="cards">
        <article class="card">
          <p class="stat-title">Bu Haftaki Toplam Mail</p>
          <p class="stat-value" id="weeklyMailCount">0</p>
        </article>
        <article class="card">
          <p class="stat-title">En Çok İletişim Kurulan 3 Kişi</p>
          <p class="stat-value" id="topContact">-</p>
        </article>
        <article class="card">
          <div class="filter-row">
            <p class="stat-title" style="margin:0;">Tamamlanan Ödevler</p>
            <select id="topicFilter"></select>
          </div>
          <p class="stat-value" id="homeworkCount">0</p>
        </article>
      </section>

      <section class="content-grid">
        <article class="card">
          <h2 class="section-title">Haftalık Mail Trafiği</h2>
          <div class="chart-wrap">
            <canvas id="weeklyMailChart"></canvas>
          </div>
        </article>

        <article class="card">
          <h2 class="section-title">Aktivite Özeti</h2>
          <ul class="timeline" id="timelineList"></ul>
        </article>
      </section>
      <section class="content-grid" style="margin-top:14px;">
        <article class="card">
          <h2 class="section-title">Mail Özeti</h2>
          <ul class="timeline" id="mailSummaryList"></ul>
        </article>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const parent = { name: 'Ayşe Yılmaz', studentName: 'Ela Kaya' };
      const teacherEmail = 'ogretmen@alfabe.co';

      const weeklyTraffic = [
        { day: 'Pzt', count: 4 },
        { day: 'Sal', count: 2 },
        { day: 'Çar', count: 6 },
        { day: 'Per', count: 3 },
        { day: 'Cum', count: 5 },
        { day: 'Cmt', count: 1 },
        { day: 'Paz', count: 2 },
      ];

      const activitySummary = [
        { title: 'Proje ödevi Matematik Öğretmeni ile paylaşıldı', time: 'Bugün 09:40' },
        { title: 'Fen etkinliği raporu sınıf grubuna gönderildi', time: 'Dün 16:10' },
        { title: 'İngilizce kelime çalışması danışmana iletildi', time: 'Dün 12:20' },
        { title: 'Sanat ödevi fotoğrafı öğretmene ulaştırıldı', time: '2 gün önce 18:05' },
      ];

      const communications = [
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'fen.ogretmeni@alfabe.co' },
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'ingilizce.ogretmeni@alfabe.co' },
      ];

      const completedHomework = [
        { topic: 'Matematik', title: 'Kesirler çalışma kağıdı' },
        { topic: 'Fen', title: 'Güneş sistemi posteri' },
        { topic: 'Matematik', title: 'Problem çözme seti' },
        { topic: 'Türkçe', title: 'Hikaye özeti yazımı' },
        { topic: 'Fen', title: 'Mıknatıs deneyi raporu' },
      ];
      const mailSummary = [
        { type: 'Gelen', from: 'matematik.ogretmeni@alfabe.co', message: 'Bugün derste kesirler için ek kaynak paylaşıldı.' },
        { type: 'Giden', from: 'veli.ayse@alfabe.co', message: 'Etüt saatiyle ilgili kısa bir soru sormak istiyorum.' },
        { type: 'Gelen', from: 'fen.ogretmeni@alfabe.co', message: 'Fen projesi teslim tarihi cuma gününe güncellendi.' },
      ];

      const dom = {
        parentInfo: document.getElementById('parentInfo'),
        studentInfo: document.getElementById('studentInfo'),
        weeklyMailCount: document.getElementById('weeklyMailCount'),
        topContact: document.getElementById('topContact'),
        homeworkCount: document.getElementById('homeworkCount'),
        topicFilter: document.getElementById('topicFilter'),
        timelineList: document.getElementById('timelineList'),
        contactTeacherBtn: document.getElementById('contactTeacherBtn'),
        mailSummaryList: document.getElementById('mailSummaryList'),
      };

      function renderHeader() {
        dom.parentInfo.textContent = `Veli: ${parent.name}`;
        dom.studentInfo.textContent = `Öğrenci: ${parent.studentName}`;
      }

      function computeTopContact() {
        const counts = communications.reduce((acc, row) => {
          acc[row.person] = (acc[row.person] || 0) + 1;
          return acc;
        }, {});
        const top3 = Object.entries(counts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 3)
          .map(([person]) => person)
          .join(', ');
        return top3 || '-';
      }

      function renderStats() {
        const totalMail = weeklyTraffic.reduce((sum, day) => sum + day.count, 0);
        dom.weeklyMailCount.textContent = String(totalMail);
        dom.topContact.textContent = computeTopContact();
      }

      function renderTopicFilter() {
        const topics = ['Tümü', ...new Set(completedHomework.map(item => item.topic))];
        dom.topicFilter.innerHTML = topics
          .map(topic => `<option value="${topic}">${topic}</option>`)
          .join('');
      }

      function renderHomeworkCount() {
        const selected = dom.topicFilter.value;
        const filtered = selected === 'Tümü'
          ? completedHomework
          : completedHomework.filter(item => item.topic === selected);

        dom.homeworkCount.textContent = String(filtered.length);
      }

      function renderTimeline() {
        dom.timelineList.innerHTML = activitySummary
          .map(item => `<li>${item.title}<small>${item.time}</small></li>`)
          .join('');
      }

      function renderMailSummary() {
        dom.mailSummaryList.innerHTML = mailSummary
          .map((mail) => {
            const shortMail = `${mail.from.slice(0, 3)}...`;
            const shortMessage = `${mail.message.slice(0, 28)}...`;
            return `<li><strong>${mail.type}</strong> • ${shortMail}<small>${shortMessage}</small></li>`;
          })
          .join('');
      }


      function contactTeacher() {
        const subject = encodeURIComponent(`${parent.studentName} hakkında bilgi talebi`);
        const body = encodeURIComponent(`Merhaba Öğretmenim,

Grafikte bir düşüş fark ettim ve kısa bir değerlendirme rica ediyorum.

Teşekkürler.`);
        window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
      }

      function renderChart() {
        const ctx = document.getElementById('weeklyMailChart');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: weeklyTraffic.map(item => item.day),
            datasets: [{
              label: 'Mail Sayısı',
              data: weeklyTraffic.map(item => item.count),
              backgroundColor: ['#f8d972', '#f2cf65', '#ebc65c', '#e8bd52', '#ddb144', '#d7a73a', '#cc9b2d'],
              borderRadius: 9,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: '#304870' },
              },
              y: {
                beginAtZero: true,
                ticks: { precision: 0, color: '#304870' },
                grid: { color: '#ecedf3' },
              },
            },
          },
        });
      }

      dom.topicFilter.addEventListener('change', renderHomeworkCount);
      dom.contactTeacherBtn.addEventListener('click', contactTeacher);

      renderHeader();
      renderStats();
      renderTopicFilter();
      renderHomeworkCount();
      renderTimeline();
      renderMailSummary();
      renderChart();
    </script>
      <script src="./demo-auth.js"></script>
  </body>
</html>

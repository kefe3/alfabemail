<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfabe Portal | Veli Paneli</title>
    <style>
      :root {
        --navy: #1f3152;
        --navy-soft: #304870;
        --cream: #fff8de;
        --cream-2: #fff3c3;
        --card: #ffffff;
        --muted: #6b7690;
        --line: #e7e9ef;
        --shadow: 0 14px 28px rgba(31, 49, 82, 0.14);
        --radius: 16px;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Nunito', 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, #fffef9 8%, var(--cream) 55%, #f4f6ff 100%);
        color: var(--navy);
      }

      .container {
        width: min(1180px, 95vw);
        margin: 24px auto;
      }

      .header {
        background: linear-gradient(140deg, var(--navy), var(--navy-soft));
        color: #fff;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .header h1 { margin: 0 0 6px; font-size: clamp(22px, 4vw, 30px); }
      .header p { margin: 0; opacity: 0.92; }

      .badge {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        padding: 9px 14px;
        font-weight: 700;
      }

      .contact-btn {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        background: #f6d36e;
        color: #253b62;
        cursor: pointer;
      }

      .cards {
        margin-top: 14px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .stat-title {
        font-size: 13px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      .stat-value {
        font-size: 30px;
        font-weight: 800;
        margin: 0;
        color: var(--navy);
      }

      .content-grid {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 14px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 19px;
      }

      .chart-wrap {
        position: relative;
        height: 320px;
      }

      .filter-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      select {
        border: 1px solid #d5dbe8;
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        color: var(--navy);
        background: #fff;
      }

      .timeline {
        list-style: none;
        margin: 0;
        padding: 0;
        border-left: 3px solid #f0df9d;
      }

      .timeline li {
        position: relative;
        margin-left: 14px;
        padding: 0 0 12px 10px;
        color: #2f4568;
      }

      .timeline li::before {
        content: '';
        position: absolute;
        left: -18px;
        top: 4px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f3c854;
      }

      .timeline small { color: var(--muted); display: block; margin-top: 3px; }

      .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .login-wrap.hidden { display: none; }
      .login-card {
        width: 100%;
        max-width: 400px;
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 28px;
        border: 2px solid #e7e9ef;
      }
      .login-card h1 { margin: 0 0 8px; font-size: 22px; color: var(--navy); }
      .login-card .sub { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
      .login-card label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--muted); }
      .login-card input { margin-bottom: 14px; border: 1px solid var(--line); border-radius: 10px; padding: 10px; width: 100%; }
      .login-card .btn { width: 100%; padding: 12px; margin-top: 6px; border: none; border-radius: 999px; font-weight: 700; background: var(--navy); color: #fff; cursor: pointer; }
      .login-card .login-status { margin-top: 12px; font-size: 13px; color: var(--muted); }
      .login-card .login-status.error { color: #b71c1c; }
      .login-card .login-status.success { color: #236245; }
      .panel-wrap.hidden { display: none !important; }

      @media (max-width: 920px) {
        .cards { grid-template-columns: 1fr; }
        .content-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="loginWrap" class="login-wrap">
      <div class="login-card">
        <h1>👨‍👩‍👧 Veli Girişi</h1>
        <p class="sub">Şahsi e-postanıza gelen link ile oluşturduğunuz şifre ile giriş yapın.</p>
        <form id="loginForm">
          <label for="loginEmail">E-posta</label>
          <input id="loginEmail" type="email" placeholder="veli@alfabe.co" required />
          <label for="loginPassword">Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifre" required />
          <button type="submit" class="btn">Giriş Yap</button>
        </form>
        <div id="loginStatus" class="login-status"></div>
      </div>
    </div>

    <div id="panelWrap" class="panel-wrap hidden">
    <div class="container">
      <header class="header">
        <div>
          <h1>🧭 Veli Dashboard</h1>
          <p id="parentInfo"></p>
          <p id="studentInfo"></p>
        </div>
        <div style="display:grid; gap:8px; justify-items:end;">
          <div class="badge">Pastel Güvenli Görünüm</div>
          <button class="contact-btn" id="contactTeacherBtn">Öğretmenle İletişim</button>
          <button class="contact-btn" id="logoutBtn" style="background:#fff;color:var(--navy);border:1px solid rgba(255,255,255,0.5);">Çıkış Yap</button>
        </div>
      </header>

      <section class="cards">
        <article class="card">
          <p class="stat-title">Bu Haftaki Toplam Mail</p>
          <p class="stat-value" id="weeklyMailCount">0</p>
        </article>
        <article class="card">
          <p class="stat-title">En Çok İletişim Kurulan Kişi</p>
          <p class="stat-value" id="topContact">-</p>
        </article>
        <article class="card">
          <div class="filter-row">
            <p class="stat-title" style="margin:0;">Tamamlanan Ödevler</p>
            <select id="topicFilter"></select>
          </div>
          <p class="stat-value" id="homeworkCount">0</p>
        </article>
      </section>

      <section class="content-grid">
        <article class="card">
          <h2 class="section-title">Haftalık Mail Trafiği</h2>
          <div class="chart-wrap">
            <canvas id="weeklyMailChart"></canvas>
          </div>
        </article>

        <article class="card">
          <h2 class="section-title">Aktivite Özeti</h2>
          <ul class="timeline" id="timelineList"></ul>
        </article>
      </section>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      const VELI_SESSION_KEY = 'alfabe_veli_session';
      const VELILER_STORAGE_KEY = 'alfabe_veliler';

      function seedVeliler() {
        if (localStorage.getItem(VELILER_STORAGE_KEY)) return;
        const list = [
          { email: 'veli@alfabe.co', password: 'alfabe123', name: 'Demo Veli', studentName: 'Demo Öğrenci' },
        ];
        localStorage.setItem(VELILER_STORAGE_KEY, JSON.stringify(list));
      }
      seedVeliler();

      function getVeliSession() {
        try {
          return JSON.parse(sessionStorage.getItem(VELI_SESSION_KEY) || 'null');
        } catch (_) { return null; }
      }
      function setVeliSession(veli) {
        sessionStorage.setItem(VELI_SESSION_KEY, JSON.stringify(veli));
      }
      function clearVeliSession() {
        sessionStorage.removeItem(VELI_SESSION_KEY);
      }

      const loginWrap = document.getElementById('loginWrap');
      const panelWrap = document.getElementById('panelWrap');
      const loginForm = document.getElementById('loginForm');
      const loginStatus = document.getElementById('loginStatus');
      const loginEmail = document.getElementById('loginEmail');
      const loginPassword = document.getElementById('loginPassword');

      function showPanel() {
        loginWrap.classList.add('hidden');
        panelWrap.classList.remove('hidden');
      }
      function showLogin() {
        panelWrap.classList.add('hidden');
        loginWrap.classList.remove('hidden');
        loginStatus.textContent = '';
      }

      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const email = loginEmail.value.trim().toLowerCase();
        const password = loginPassword.value;
        const list = JSON.parse(localStorage.getItem(VELILER_STORAGE_KEY) || '[]');
        const veli = list.find(v => v.email && v.email.toLowerCase() === email && v.password === password);
        if (veli) {
          setVeliSession(veli);
          parent.name = veli.name;
          parent.studentName = veli.studentName;
          loginStatus.className = 'login-status success';
          showPanel();
          initDashboard();
        } else {
          loginStatus.textContent = 'E-posta veya şifre hatalı.';
          loginStatus.className = 'login-status error';
        }
      });

      document.getElementById('logoutBtn').addEventListener('click', function () {
        clearVeliSession();
        showLogin();
      });

      let parent = { name: 'Demo Veli', studentName: 'Demo Öğrenci' };
      const teacherEmail = 'ogretmen@alfabe.co';

      if (getVeliSession()) {
        const s = getVeliSession();
        parent = { name: s.name || parent.name, studentName: s.studentName || parent.studentName };
        showPanel();
      } else {
        showLogin();
      }

      const weeklyTraffic = [
        { day: 'Pzt', count: 4 },
        { day: 'Sal', count: 2 },
        { day: 'Çar', count: 6 },
        { day: 'Per', count: 3 },
        { day: 'Cum', count: 5 },
        { day: 'Cmt', count: 1 },
        { day: 'Paz', count: 2 },
      ];

      const activitySummary = [
        { title: 'Proje ödevi Matematik Öğretmeni ile paylaşıldı', time: 'Bugün 09:40' },
        { title: 'Fen etkinliği raporu sınıf grubuna gönderildi', time: 'Dün 16:10' },
        { title: 'İngilizce kelime çalışması danışmana iletildi', time: 'Dün 12:20' },
        { title: 'Sanat ödevi fotoğrafı öğretmene ulaştırıldı', time: '2 gün önce 18:05' },
      ];

      const communications = [
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'fen.ogretmeni@alfabe.co' },
        { person: 'matematik.ogretmeni@alfabe.co' },
        { person: 'ingilizce.ogretmeni@alfabe.co' },
      ];

      const completedHomework = [
        { topic: 'Matematik', title: 'Kesirler çalışma kağıdı' },
        { topic: 'Fen', title: 'Güneş sistemi posteri' },
        { topic: 'Matematik', title: 'Problem çözme seti' },
        { topic: 'Türkçe', title: 'Hikaye özeti yazımı' },
        { topic: 'Fen', title: 'Mıknatıs deneyi raporu' },
      ];

      const dom = {
        parentInfo: document.getElementById('parentInfo'),
        studentInfo: document.getElementById('studentInfo'),
        weeklyMailCount: document.getElementById('weeklyMailCount'),
        topContact: document.getElementById('topContact'),
        homeworkCount: document.getElementById('homeworkCount'),
        topicFilter: document.getElementById('topicFilter'),
        timelineList: document.getElementById('timelineList'),
        contactTeacherBtn: document.getElementById('contactTeacherBtn'),
      };

      function renderHeader() {
        dom.parentInfo.textContent = `Veli: ${parent.name}`;
        dom.studentInfo.textContent = `Öğrenci: ${parent.studentName}`;
      }

      function computeTopContact() {
        const counts = communications.reduce((acc, row) => {
          acc[row.person] = (acc[row.person] || 0) + 1;
          return acc;
        }, {});

        const [person] = Object.entries(counts).sort((a, b) => b[1] - a[1])[0] || ['-'];
        return person;
      }

      function renderStats() {
        const totalMail = weeklyTraffic.reduce((sum, day) => sum + day.count, 0);
        dom.weeklyMailCount.textContent = String(totalMail);
        dom.topContact.textContent = computeTopContact();
      }

      function renderTopicFilter() {
        const topics = ['Tümü', ...new Set(completedHomework.map(item => item.topic))];
        dom.topicFilter.innerHTML = topics
          .map(topic => `<option value="${topic}">${topic}</option>`)
          .join('');
      }

      function renderHomeworkCount() {
        const selected = dom.topicFilter.value;
        const filtered = selected === 'Tümü'
          ? completedHomework
          : completedHomework.filter(item => item.topic === selected);

        dom.homeworkCount.textContent = String(filtered.length);
      }

      function renderTimeline() {
        dom.timelineList.innerHTML = activitySummary
          .map(item => `<li>${item.title}<small>${item.time}</small></li>`)
          .join('');
      }


      function contactTeacher() {
        const subject = encodeURIComponent(`${parent.studentName} hakkında bilgi talebi`);
        const body = encodeURIComponent(`Merhaba Öğretmenim,

Grafikte bir düşüş fark ettim ve kısa bir değerlendirme rica ediyorum.

Teşekkürler.`);
        window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
      }

      function renderChart() {
        const ctx = document.getElementById('weeklyMailChart');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: weeklyTraffic.map(item => item.day),
            datasets: [{
              label: 'Mail Sayısı',
              data: weeklyTraffic.map(item => item.count),
              backgroundColor: ['#f8d972', '#f2cf65', '#ebc65c', '#e8bd52', '#ddb144', '#d7a73a', '#cc9b2d'],
              borderRadius: 9,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                grid: { display: false },
                ticks: { color: '#304870' },
              },
              y: {
                beginAtZero: true,
                ticks: { precision: 0, color: '#304870' },
                grid: { color: '#ecedf3' },
              },
            },
          },
        });
      }

      dom.topicFilter.addEventListener('change', renderHomeworkCount);
      dom.contactTeacherBtn.addEventListener('click', contactTeacher);

      function initDashboard() {
        renderHeader();
        renderStats();
        renderTopicFilter();
        renderHomeworkCount();
        renderTimeline();
        renderChart();
      }

      if (panelWrap && !panelWrap.classList.contains('hidden')) {
        initDashboard();
      }
    </script>
  </body>
</html>

<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Student Email Portal</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }\n        .container { width: 90%; max-width: 600px; margin: auto; padding: 20px; background: white; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }\n        h2 { text-align: center; }\n        .form-group { margin-bottom: 15px; }\n        label { display: block; margin-bottom: 5px; }\n        input[type='text'], input[type='password'], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }\n        button { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }\n        button:hover { background-color: #218838; }\n    </style>\n</head>\n<body>\n    <div class="container">\n        <h2>Student Email Portal</h2>\n        <form id="loginForm">\n            <div class="form-group">\n                <label for="email">Email:</label>\n                <input type="text" id="email" required>\n            </div>\n            <div class="form-group">\n                <label for="password">Password:</label>\n                <input type="password" id="password" required>\n            </div>\n            <button type="submit">Login</button>\n        </form>\n        <div id="inbox" style="display: none;">\n            <h3>Inbox</h3>\n            <div id="messages"></div>\n            <h4>Send Mail</h4>\n            <textarea id="mailContent" placeholder="Type your message..."></textarea>\n            <button id="sendMail">Send</button>\n        </div>\n        <div id="qrScanner" style="display: none;">\n            <h3>QR Code Scanner</h3>\n            <button id="scanQr">Scan QR Code</button>\n            <div id="qrResult"></div>\n        </div>\n    </div>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsqr.min.js"></script>\n    <script>\n        document.getElementById('loginForm').onsubmit = function(event) {\n            event.preventDefault();\n            // Implement login functionality here\n            document.getElementById('inbox').style.display = 'block';\n            document.getElementById('qrScanner').style.display = 'block';\n        };\n        document.getElementById('sendMail').onclick = function() {\n            const content = document.getElementById('mailContent').value;\n            // Implement email sending logic here\n            alert('Mail sent: ' + content);\n        };\n        document.getElementById('scanQr').onclick = function() {\n            // Implement QR code scanning functionality here\n            alert('QR code scanning not implemented in this example.');\n        };\n    <\/script>\n</body>\n</html>

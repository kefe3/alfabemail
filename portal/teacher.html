<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Teacher Dashboard</h1>

    <section id="file-upload">
        <h2>Upload CSV/Excel Files</h2>
        <input type="file" accept=".csv, .xls, .xlsx">
        <button onclick="uploadFile()">Upload</button>
    </section>

    <section id="email-suggestion">
        <h2>Automatic Email Suggestion</h2>
        <input type="text" id="student-name" placeholder="Enter student name">
        <button onclick="suggestEmail()">Suggest Email</button>
        <p id="email-output"></p>
    </section>

    <section id="qr-code">
        <h2>QR Code Badge Generation</h2>
        <input type="text" id="student-id" placeholder="Enter student ID">
        <button onclick="generateQRCode()">Generate QR Code</button>
        <div id="qr-code-output"></div>
    </section>

    <section id="bulk-management">
        <h2>Bulk Student Management</h2>
        <textarea id="student-list" placeholder="Enter student details (one per line)"></textarea>
        <button onclick="manageStudents()">Manage Students</button>
    </section>

    <script src="scripts.js"></script>
</body>
</html>
